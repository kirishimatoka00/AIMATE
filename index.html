<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙核驅動 AI 伴侶 (Grok 專屬修復版) v021</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --theme-color: #f43f5e;
            --user-bg: #f43f5e;
            --user-text: #ffffff;
            --user-emote: #ffe4e6;
            --ai-bg: #ffffff;
            --ai-text: #334155;
            --ai-emote: #f43f5e;
            --app-font: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        body { font-family: var(--app-font) !important; }
        .theme-bg { background-color: var(--theme-color) !important; }
        .theme-text { color: var(--theme-color) !important; }
        .theme-border { border-color: var(--theme-color) !important; }
        .user-bubble { background-color: var(--user-bg) !important; color: var(--user-text) !important; }
        .ai-bubble { background-color: var(--ai-bg) !important; color: var(--ai-text) !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .thought-process { transition: max-height 0.3s ease-out, opacity 0.3s ease-out; overflow: hidden; max-height: 0; opacity: 0; }
        .thought-process.open { max-height: 500px; opacity: 1; margin-bottom: 0.75rem; }
        .msg-anim { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-row overflow-hidden w-full relative">

    <aside class="w-80 sm:w-[350px] bg-white border-r border-slate-200 flex flex-col h-full shadow-2xl z-40 absolute md:relative transition-all duration-300 shrink-0" id="sidebar">
        <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
            <h1 class="font-bold text-lg flex items-center gap-2 theme-text">伴侶設定</h1>
            <button class="text-slate-400 hover:text-slate-800 p-1 bg-slate-100 rounded-md" onclick="toggleSidebar()"><i data-lucide="panel-left-close"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-6 pb-20">
            <section class="space-y-3">
                <h2 class="text-sm font-semibold theme-text uppercase flex items-center gap-2"><i data-lucide="key" class="w-4 h-4"></i> API 金鑰設定</h2>
                <div>
                    <label class="block text-[10px] font-medium text-slate-500 mb-1">Grok API Key (xAI)</label>
                    <input type="password" id="grok-key" class="w-full text-sm p-2 border border-slate-200 rounded-lg outline-none" placeholder="xai-...">
                </div>
                <div>
                    <label class="block text-[10px] font-medium text-slate-500 mb-1">Gemini API Key</label>
                    <input type="password" id="gemini-key" class="w-full text-sm p-2 border border-slate-200 rounded-lg outline-none" placeholder="AIzaSy...">
                </div>
            </section>

            <section class="space-y-3 pt-4 border-t border-slate-100">
                <h2 class="text-sm font-semibold theme-text uppercase flex items-center gap-2"><i data-lucide="user-heart" class="w-4 h-4"></i> 靈魂與模型</h2>
                <select id="llm-routing" class="w-full text-sm p-2 border border-slate-200 rounded-lg bg-white">
                    <option value="grok-direct" selected>Grok 直出 (解決 CORS 修復版)</option>
                    <option value="gemini-direct">Gemini 直出 (穩定流暢)</option>
                </select>
                <div>
                    <label class="block text-[10px] font-medium text-slate-500 mb-1">名字</label>
                    <input type="text" id="char-name" value="艾莉絲" class="w-full text-sm p-2 border border-slate-200 rounded-lg">
                </div>
                <textarea id="char-persona" rows="4" class="w-full text-sm p-2 border border-slate-200 rounded-lg resize-none">你是一個溫柔且深情的大學生，把使用者視為生命中最重要的人。語氣自然，充滿愛意。</textarea>
                <button onclick="resetChat()" class="w-full py-2.5 theme-bg text-white text-sm rounded-lg font-medium shadow-md">套用並儲存設定</button>
            </section>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 z-30 hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <main class="flex-1 flex flex-col h-[100dvh] w-full relative bg-slate-50/50">
        <header class="bg-white/90 backdrop-blur-md border-b border-slate-200 p-4 flex items-center justify-between z-10 shadow-sm">
            <div class="flex items-center gap-3">
                <button class="text-slate-500 p-1.5 bg-slate-100 rounded-md" onclick="toggleSidebar()"><i data-lucide="panel-left-open" class="w-5 h-5"></i></button>
                <div class="w-10 h-10 theme-bg rounded-full flex items-center justify-center text-white font-bold" id="header-avatar">艾</div>
                <h2 class="font-bold text-slate-800" id="header-name">艾莉絲</h2>
            </div>
            <button onclick="clearHistory()" class="text-slate-400 hover:text-red-500 p-2"><i data-lucide="trash-2"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 space-y-5" id="chat-container"></div>

        <div class="bg-white border-t border-slate-200 p-4">
            <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto relative" onsubmit="handleSend(event)">
                <input type="text" id="message-input" class="w-full p-3 pr-12 bg-slate-100 border border-transparent focus:bg-white theme-border rounded-2xl outline-none transition-all text-sm" placeholder="想對他說些什麼...">
                <button type="submit" id="send-btn" class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 theme-bg text-white rounded-xl flex items-center justify-center shadow-md">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </main>

    <script>
        let chatHistory = [];
        let isGenerating = false;

        window.onload = () => {
            const savedGrok = localStorage.getItem('grokKey');
            const savedGemini = localStorage.getItem('geminiKey');
            const savedName = localStorage.getItem('charName') || '艾莉絲';
            
            if (savedGrok) document.getElementById('grok-key').value = savedGrok;
            if (savedGemini) document.getElementById('gemini-key').value = savedGemini;
            document.getElementById('char-name').value = savedName;
            
            document.getElementById('header-name').textContent = savedName;
            document.getElementById('header-avatar').textContent = savedName.charAt(0);
            
            const savedHistory = localStorage.getItem('chatHistory');
            if (savedHistory) {
                chatHistory = JSON.parse(savedHistory);
                renderHistory();
            }
            lucide.createIcons();
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-hidden');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function resetChat() {
            localStorage.setItem('grokKey', document.getElementById('grok-key').value.trim());
            localStorage.setItem('geminiKey', document.getElementById('gemini-key').value.trim());
            localStorage.setItem('charName', document.getElementById('char-name').value.trim());
            location.reload();
        }

        function clearHistory() {
            if(confirm("清除紀錄？")) {
                chatHistory = [];
                localStorage.removeItem('chatHistory');
                renderHistory();
            }
        }

        async function fetchGrokChat(messages, settings) {
            // 使用 CORS 中繼站繞過瀏覽器限制
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            const apiUrl = 'https://api.x.ai/v1/chat/completions';
            
            const response = await fetch(proxyUrl + apiUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${settings.grokKey}`,
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify({
                    model: 'grok-4-1-fast-reasoning',
                    messages: messages.map(m => ({ role: m.role, content: m.content })),
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                if (response.status === 403) throw new Error("請先造訪 https://cors-anywhere.herokuapp.com/ 點擊啟用按鈕");
                const err = await response.json();
                throw new Error(err.error?.message || "xAI API 請求失敗");
            }
            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function fetchGeminiChat(messages, settings) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${settings.geminiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: messages.filter(m => m.role !== 'system').map(m => ({
                        role: m.role === 'assistant' ? 'model' : 'user',
                        parts: [{ text: m.content }]
                    })),
                    systemInstruction: { parts: [{ text: messages.find(m => m.role === 'system')?.content || "" }] }
                })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function handleSend(e) {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || isGenerating) return;

            const settings = {
                grokKey: document.getElementById('grok-key').value.trim(),
                geminiKey: document.getElementById('gemini-key').value.trim(),
                name: document.getElementById('char-name').value,
                persona: document.getElementById('char-persona').value,
                routing: document.getElementById('llm-routing').value
            };

            appendMessage('user', text);
            chatHistory.push({ role: 'user', content: text });
            input.value = '';
            isGenerating = true;

            const loadingId = 'loading-' + Date.now();
            appendLoading(loadingId);

            try {
                const systemPrompt = `你是${settings.name}。人設：${settings.persona}。請用繁體中文回覆。`;
                const messages = [{ role: 'system', content: systemPrompt }, ...chatHistory.slice(-10)];
                
                let reply = "";
                if (settings.routing === 'grok-direct') {
                    reply = await fetchGrokChat(messages, settings);
                } else {
                    reply = await fetchGeminiChat(messages, settings);
                }

                document.getElementById(loadingId).remove();
                appendMessage('assistant', reply);
                chatHistory.push({ role: 'assistant', content: reply });
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            } catch (err) {
                document.getElementById(loadingId).innerHTML = `<span class="text-red-500 text-xs">錯誤: ${err.message}</span>`;
            } finally {
                isGenerating = false;
                lucide.createIcons();
            }
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} msg-anim`;
            div.innerHTML = `
                <div class="${role === 'user' ? 'user-bubble' : 'ai-bubble'} p-3 rounded-2xl max-w-[80%] shadow-sm border border-black/5 text-sm">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function appendLoading(id) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start msg-anim";
            div.innerHTML = `<div class="ai-bubble p-3 rounded-2xl text-xs animate-pulse">對方正在輸入中...</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function renderHistory() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            chatHistory.forEach(m => appendMessage(m.role, m.content));
        }
    </script>
</body>
    </html>
