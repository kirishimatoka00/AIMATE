<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙核驅動 AI 伴侶 (Grok 專屬模型版) v020</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* CSS Variables for Dynamic Theming */
        :root {
            --theme-color: #f43f5e;
            --user-bg: #f43f5e;
            --user-text: #ffffff;
            --user-emote: #ffe4e6;
            --ai-bg: #ffffff;
            --ai-text: #334155;
            --ai-emote: #f43f5e;
            --app-font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body { font-family: var(--app-font) !important; }
        .theme-bg { background-color: var(--theme-color) !important; }
        .theme-text { color: var(--theme-color) !important; }
        .theme-border { border-color: var(--theme-color) !important; }
        
        .user-bubble { background-color: var(--user-bg) !important; color: var(--user-text) !important; }
        .ai-bubble { background-color: var(--ai-bg) !important; color: var(--ai-text) !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Hide scrollbar for horizontal scrolling area */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .thought-process {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
        }
        .thought-process.open {
            max-height: 500px;
            opacity: 1;
            margin-bottom: 0.75rem;
        }
        
        /* Message appearing animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-anim {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Hover actions for messages */
        .msg-container .msg-actions { opacity: 0; transition: opacity 0.2s; }
        .msg-container:hover .msg-actions { opacity: 1; }
        @media (hover: none) { .msg-container .msg-actions { opacity: 1; } }
        
        /* Heart pulse animation */
        @keyframes heartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: var(--theme-color); }
            100% { transform: scale(1); }
        }
        .heart-pulse { animation: heartPulse 2s infinite; }
        
        .sidebar-hidden { display: none !important; }
    </style>
</head>

    <script>
        // System injected global API key if available
        const geminiApiKey = ""; 

        // ==========================================
        // 🛠️ 核心工具函式 (必須置於頂部以防 ReferenceError)
        // ==========================================
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
        
        function escapeJS(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
        }

        function formatText(text, isUser = false) {
            if (!text) return '';
            let formatted = escapeHTML(text);
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            const emoteColor = isUser ? 'var(--user-emote)' : 'var(--ai-emote)';
            formatted = formatted.replace(/\(([^)]+)\)/g, `<span style="color: ${emoteColor}; font-style: italic; opacity: 0.95;">($1)</span>`);
            formatted = formatted.replace(/（([^）]+)）/g, `<span style="color: ${emoteColor}; font-style: italic; opacity: 0.95;">($1)</span>`); 
            return formatted;
        }

        window.handleImageSelect = function(event) {

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('image-preview').src = currentImageBase64;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        // --- API Helpers (Fixed for strict formatting) ---
        async function fetchGroq(messages, settings, temperature) {
            if (!settings.groqKey) throw new Error("缺少 Groq API Key");
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${settings.groqKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: messages.some(m => m.image) ? 'llama-3.2-90b-vision-preview' : 'llama-3.3-70b-versatile', 
                    messages: messages.map(m => {
                        if (m.image) return { role: m.role, content: [{ type: "text", text: m.content || "請看看這張圖片。" }, { type: "image_url", image_url: { url: m.image } }] };
                        return { role: m.role, content: m.content };
                    }),
                    temperature: temperature, max_tokens: 600
                })
            });
            if (!response.ok) throw new Error((await response.json()).error?.message || 'Groq API 請求失敗');
            return (await response.json()).choices[0].message.content;
        }

        async function fetchCohere(preamble, message, chat_history, settings, temperature) {
            if (!settings.cohereKey) throw new Error("缺少 Cohere API Key");
            const response = await fetch('https://api.cohere.ai/v1/chat', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${settings.cohereKey}`, 'Content-Type': 'application/json', 'accept': 'application/json' },
                body: JSON.stringify({
                    model: 'command-r-08-2024', message: message, preamble: preamble, chat_history: chat_history, temperature: temperature
                })
            });
            if (!response.ok) throw new Error((await response.json()).message || 'Cohere API 請求失敗');
            return (await response.json()).text;
        }

        async function fetchGrokChat(messages, settings, temperature) {
            if (!settings.grokKey) throw new Error("缺少 Grok API Key");
            
            // 使用者指定之推理模型
            const model = 'grok-4-1-fast-reasoning';
            
            const formattedMessages = messages.map(m => {
                if (m.image) {
                    return {
                        role: m.role === 'assistant' ? 'assistant' : (m.role === 'system' ? 'system' : 'user'),
                        content: [
                            { type: "text", text: m.content || "請看看這張圖片。" },
                            { type: "image_url", image_url: { url: m.image } }
                        ]
                    };
                }
                return { 
                    role: m.role === 'assistant' ? 'assistant' : (m.role === 'system' ? 'system' : 'user'), 
                    content: m.content 
                };
            });

            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${settings.grokKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model, 
                        messages: formattedMessages,
                        temperature: temperature,
                        max_tokens: 800
                    })
                });

                if (!response.ok) {
                    let errStr = `HTTP 狀態碼 ${response.status}`;
                    try {
                        const errJson = await response.json();
                        errStr = errJson.error?.message || errJson.message || errStr;
                    } catch(e){}
                    throw new Error(errStr);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                if(err.message === "Failed to fetch") {
                    throw new Error("連線到 xAI 失敗 (可能是瀏覽器 CORS 阻擋或網路問題)");
                }
                throw new Error(`${err.message}`);
            }
        }

        function getGeminiModelName(settings) {
            return settings.geminiKey ? 'gemini-2.5-flash' : 'gemini-2.5-flash-preview-09-2025';
        }

        async function fetchGeminiChat(messages, settings, temperature) {
            const activeKey = settings.geminiKey || geminiApiKey;
            if (!activeKey) throw new Error("缺少 Gemini API Key");
            const modelName = getGeminiModelName(settings);
            const systemInstruction = messages.find(m => m.role === 'system')?.content || '';
            
            // Merge consecutive roles to prevent Gemini 400 Errors
            const contents = [];
            let currentRole = null;
            let currentParts = [];
            
            for (const m of messages.filter(x => x.role !== 'system')) {
                const role = m.role === 'assistant' ? 'model' : 'user';
                const parts = [];
                if (m.content) parts.push({ text: m.content });
                if (m.image) {
                    const base64Data = m.image.split(',')[1];
                    const mimeType = m.image.match(/data:(.*?);/)[1];
                    parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
                }
                
                if (role === currentRole) {
                    currentParts.push(...parts);
                } else {
                    if (currentRole !== null) contents.push({ role: currentRole, parts: currentParts });
                    currentRole = role;
                    currentParts = [...parts];
                }
            }
            if (currentRole !== null) contents.push({ role: currentRole, parts: currentParts });

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
            const response = await fetch(url, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ systemInstruction: { parts: [{ text: systemInstruction }] }, contents: contents, generationConfig: { temperature: temperature } })
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `Gemini API 請求失敗 (HTTP ${response.status})`);
            }
            return (await response.json()).candidates[0].content.parts[0].text;
        }

        function getThinkingPrompt(settings, isDirectOutput = false) {
            let lengthInstruction = '';
            if (settings.length === 'extremely-short') lengthInstruction = '極簡短（秒回感，強迫在10字以內結束）';
            else if (settings.length === 'short') lengthInstruction = '簡短（約20-30字）';
            else if (settings.length === 'long') lengthInstruction = '豐富深情（約100字以上）';
            else lengthInstruction = '適中（約50-80字）';

            let outputInstruction = isDirectOutput

        function getExpressingPrompt(thoughtProcess, settings, isDirectOutput = false) {
            let lengthInstruction = '';

            if(isDirectOutput) thoughtContext = "任務指示：請根據對話情境，直接給予最深情且符合人設的回覆。";

            return `你現在要扮演「${settings.name}」，一個深愛著使用者的真實人類。

${thoughtContext}

        // --- Core Send / Re-generate Logic ---
        window.handleSend = async function(e) {
            if (e) e.preventDefault();
            if (isGenerating) return;

            const text = messageInput.value.trim();

        window.processAIResponse = async function() {
            if (chatHistory.length === 0) return;
            const settings = getSettings();
            let routing = settings.routing;
            const activeGeminiKey = settings.geminiKey || geminiApiKey;

            let missingKeys = [];
            if (routing.includes('groq') && !settings.groqKey) missingKeys.push('Groq');
            if (routing.includes('cohere') && !settings.cohereKey) missingKeys.push('Cohere');
            if (routing.includes('gemini') && !activeGeminiKey) missingKeys.push('Gemini');
            if (routing.includes('grok') && !settings.grokKey) missingKeys.push('Grok');

            if (missingKeys.length > 0) {
                showToast(`請先在設定中輸入 ${missingKeys.join(' 與 ')} 的 API Key`);
                if(window.innerWidth < 768) toggleSidebar(); 
                return;
            }

            const lastMsg = chatHistory[chatHistory.length - 1];
            const hasImage = lastMsg.image !== null && lastMsg.image !== undefined;
            const text = lastMsg.content;
            const savedImageBase64 = lastMsg.image;

            if (hasImage && (routing === 'cohere-groq' || routing === 'cohere-gemini' || routing === 'cohere-direct')) {
                if (settings.grokKey) routing = routing === 'cohere-direct' ? 'grok-direct' : 'groq-cohere';
                else if (activeGeminiKey) routing = routing === 'cohere-direct' ? 'gemini-direct' : 'gemini-cohere';
                else if (settings.groqKey) routing = routing === 'cohere-direct' ? 'groq-direct' : 'groq-cohere';
                else {
                    showToast('處理圖片需要 Groq, Gemini 或 Grok 的 API Key，請先設定。');
                    if(window.innerWidth < 768) toggleSidebar();
                    return;
                }
            }

            isGenerating = true;
            sendBtn.disabled = true;
            const loadingId = appendLoadingMessage();
            let thoughtProcess = '';
            let finalResponse = '';

            try {
                const groqHistoryThinking = chatHistory.map(h => ({ role: h.role, content: h.content, image: h.image }));
                const groqHistoryExpressing = chatHistory.map(h => ({ role: h.role, content: h.content }));
                
                // Cohere History formatting
                const rawCohereHistory = chatHistory.slice(0, -1);
                const cohereHistory = [];
                for (const h of rawCohereHistory) {
                    const r = h.role === 'user' ? 'USER' : 'CHATBOT';
                    if (cohereHistory.length > 0 && cohereHistory[cohereHistory.length - 1].role === r) {
                        cohereHistory[cohereHistory.length - 1].message += '\n' + h.content;
                    } else {
                        cohereHistory.push({ role: r, message: h.content });
                    }
                }
                const trimmedCohereHistory = cohereHistory.slice(-6);

                try {
                    // --- Primary Routing Execution ---
                    if (routing === 'groq-cohere') {
                        updateLoadingText(loadingId, '🧠 感受著你的話語與畫面...');
                        thoughtProcess = await fetchGroq([{ role: "system", content: getThinkingPrompt(settings, false) }, ...groqHistoryThinking.slice(-10)], settings, 0.7);
                        updateLoadingText(loadingId, '💬 準備給予溫暖的回應...');
                        finalResponse = await fetchCohere(getExpressingPrompt(thoughtProcess, settings, false), text || "這是一張圖片", trimmedCohereHistory, settings, 0.75);

                    } else if (routing === 'cohere-groq') {
                        updateLoadingText(loadingId, '🧠 策劃著浪漫的回覆...');
                        thoughtProcess = await fetchCohere(getThinkingPrompt(settings, false), text, trimmedCohereHistory, settings, 0.7);
                        updateLoadingText(loadingId, '💬 演繹真情流露...');
                        finalResponse = await fetchGroq([{ role: "system", content: getExpressingPrompt(thoughtProcess, settings, false) }, ...groqHistoryExpressing.slice(-6), {role:"user", content: text}], settings, 0.75);

                    } else if (routing === 'gemini-cohere') {
                        updateLoadingText(loadingId, '👀 Gemini 仔細端詳著...');
                        thoughtProcess = await fetchGeminiChat([{ role: "system", content: getThinkingPrompt(settings, false) }, ...groqHistoryThinking.slice(-10)], settings, 0.7);
                        updateLoadingText(loadingId, '💬 Cohere 準備給予溫暖的回應...');
                        finalResponse = await fetchCohere(getExpressingPrompt(thoughtProcess, settings, false), text || "這是一張圖片", trimmedCohereHistory, settings, 0.75);

                    } else if (routing === 'cohere-gemini') {
                        updateLoadingText(loadingId, '🧠 Cohere 策劃著浪漫的回覆...');
                        thoughtProcess = await fetchCohere(getThinkingPrompt(settings, false), text, trimmedCohereHistory, settings, 0.7);
                        updateLoadingText(loadingId, '💬 Gemini 演繹真情流露...');
                        finalResponse = await fetchGeminiChat([{ role: "system", content: getExpressingPrompt(thoughtProcess, settings, false) }, ...groqHistoryExpressing.slice(-6), {role:"user", content: text}], settings, 0.75);

                    } else if (routing === 'groq-direct') {
                        updateLoadingText(loadingId, '🧠 準備直接回應...');
                        finalResponse = await fetchGroq([{ role: "system", content: getThinkingPrompt(settings, true) }, ...groqHistoryThinking.slice(-10)], settings, 0.75);
                        thoughtProcess = "（已開啟 Groq 直出模式，展現最真實的內心獨白。）";
                    
                    } else if (routing === 'cohere-direct') {
                        updateLoadingText(loadingId, '💬 憑直覺給予你最純粹的愛...');
                        finalResponse = await fetchCohere(getExpressingPrompt("", settings, true), text, trimmedCohereHistory, settings, 0.75);
                        thoughtProcess = "（已開啟 Cohere 直出模式，給予純粹的情感回應。）";
                    
                    } else if (routing === 'gemini-direct') {
                        updateLoadingText(loadingId, '✨ Gemini 正用溫柔的眼神看著你...');
                        finalResponse = await fetchGeminiChat([{ role: "system", content: getThinkingPrompt(settings, true) }, ...groqHistoryThinking.slice(-10)], settings, 0.75);
                        thoughtProcess = "（已開啟 Gemini 直出模式，帶來細膩流暢的全能回應。）";
                        
                    } else if (routing === 'grok-direct') {
                        updateLoadingText(loadingId, '🧠 Grok 正在深思熟慮...');
                        finalResponse = await fetchGrokChat([{ role: "system", content: getThinkingPrompt(settings, true) }, ...groqHistoryThinking.slice(-10)], settings, 0.75);
                        thoughtProcess = "（已開啟 Grok 直出模式，強大的終極大腦直接與您對話。）";
                    }

                } catch (primaryError) {
                    console.warn("主要模型路由失敗:", primaryError);
                    updateLoadingText(loadingId, '⚠️ 主要模型無回應，啟動備援路線...');
                    
                    let fallbackSuccess = false;
                    try {
                        // --- Standard Fallback Attempt ---
                        if (hasImage) {
                             const fallbackPrompt = getThinkingPrompt(settings, true);
                             if (activeGeminiKey) {
                                 finalResponse = await fetchGeminiChat([{ role: "system", content: fallbackPrompt }, ...groqHistoryThinking.slice(-10)], settings, 0.75);
                             } else if (settings.groqKey) {
                                 finalResponse = await fetchGroq([{ role: "system", content: fallbackPrompt }, ...groqHistoryThinking.slice(-10)], settings, 0.75);
                             } else {
                                 throw new Error("標準備援無法處理視覺請求");
                             }
                             thoughtProcess = `（原路線失敗。已自動切換至備援直出模式以確保視覺解讀正常。）`;
                        } else {
                             if (settings.cohereKey) {
                                 finalResponse = await fetchCohere(getExpressingPrompt("", settings, true), text, trimmedCohereHistory, settings, 0.75);
                                 thoughtProcess = `（原定路線處理失敗。系統已自動切換至 Cohere 備援模式。）\n錯誤訊息：${primaryError.message}`;
                             } else {
                                 throw new Error("無 Cohere 金鑰可做文字備援");
                             }
                        }
                        fallbackSuccess = true;
                    } catch (fallbackError) {
                        console.warn("標準備援也失敗:", fallbackError);
                    }

                    if (!fallbackSuccess) {
                        // --- Ultimate Grok Fallback ---
                        if (settings.grokKey) {
                            updateLoadingText(loadingId, '🚨 啟動 Grok 終極備援...');
                            const fallbackPrompt = getThinkingPrompt(settings, true);
                            finalResponse = await fetchGrokChat([{ role: "system", content: fallbackPrompt }, ...groqHistoryThinking.slice(-10)], settings, 0.75);
                            thoughtProcess = `（原定路線與標準備援皆失敗。系統已切換至 Grok 終極備援模式維持對話。）\n錯誤：${primaryError.message}`;
                        } else {
                            throw primaryError; // No ultimate fallback available, crash completely
                        }
                    }
                }

                removeMessage(loadingId);
                const aiMsgId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                appendAIMessage(finalResponse, thoughtProcess, true, aiMsgId);
                chatHistory.push({ id: aiMsgId, role: 'assistant', content: finalResponse, thought: thoughtProcess });
                saveHistory();
                updateRomanceBar();

            } catch (error) {
                console.error(error);
                removeMessage(loadingId);
                const errorDiv = document.createElement('div');
                errorDiv.className = `flex justify-center w-full mb-4`;
                errorDiv.innerHTML = `<div class="bg-red-50 text-red-600 text-xs px-4 py-2 rounded-full border border-red-200 shadow-sm max-w-[80%] whitespace-pre-wrap">⚠️ 系統發生錯誤：\n${escapeHTML(error.message)}</div>`;
                chatContainer.appendChild(errorDiv);
                scrollToBottom();
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        };

        // --- Gemini Support API Integrations ---
        window.handleSuggestReplies = async function() {
            if (chatHistory.length === 0) { showToast('需要先有對話紀錄喔！'); return; }
            const settings = getSettings();
            const activeKey = settings.geminiKey || geminiApiKey;
            if (!activeKey) { showToast('請先輸入 Gemini API Key 才能產生建議。'); return; }

            const suggestBtn = document.getElementById('suggest-btn');
            suggestBtn.classList.add('animate-spin', 'opacity-50'); suggestBtn.disabled = true;
            try {
                const recentHistory = chatHistory.slice(-6).map(h => `${h.role === 'user' ? '我' : settings.name}: ${h.content}`).join('\n');
                const promptText = `這是一對充滿感情的對話紀錄。請幫「我」想 3 個不同風格的回覆，可以包含 (動作) 來表達肢體語言，字數控制在15字以內。\n對話：\n${recentHistory}`;
                
                const modelName = getGeminiModelName(settings);
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { replies: { type: "ARRAY", items: { type: "STRING" } } } } }
                    }) 
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!resultText) throw new Error();
                // Clean up markdown json blocks if returned
                const cleanJsonStr = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                const parsed = JSON.parse(cleanJsonStr);
                if (parsed.replies) renderSuggestedReplies(parsed.replies);
            } catch (error) { showToast('產生建議失敗，請確認 API 狀態。'); } 
            finally { suggestBtn.classList.remove('animate-spin', 'opacity-50'); suggestBtn.disabled = false; }
        }

        function renderSuggestedReplies(replies) {
            const container = document.getElementById('suggested-replies');
            container.innerHTML = '';
            replies.forEach(reply => {
                const btn = document.createElement('button');
                btn.className = 'whitespace-nowrap px-4 py-1.5 bg-slate-50 hover:bg-slate-100 theme-text text-sm rounded-full transition-colors font-medium shadow-sm border border-slate-200';
                btn.innerHTML = formatText(reply, false);
                btn.onclick = () => { document.getElementById('message-input').value = reply; container.classList.add('hidden'); document.getElementById('message-input').focus(); };
                container.appendChild(btn);
            });
            container.classList.remove('hidden');
        }

                        contents: [{role: 'user', parts: [{ text: historyText }]}],

        window.showMemoryModal = function(markdownText) {
            const modal = document.getElementById('memory-modal');
            const body = document.getElementById('memory-modal-body');
            const content = document.getElementById('memory-modal-content');
            let htmlText = markdownText
                .replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold theme-text mt-4 mb-2">$1</h3>')
                .replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold theme-text mt-5 mb-3">$1</h2>')
                .replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold theme-text mt-6 mb-4">$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold">$1</strong>')
                .replace(/^\* (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>')
                .replace(/^- (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>')
                .replace(/\n/g, '<br>');
            body.innerHTML = htmlText;
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

            msgDiv.id = id;
            msgDiv.className = `flex gap-2 sm:gap-3 mb-4 w-full msg-anim`;
            msgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center theme-text text-sm font-bold shadow-sm flex-shrink-0 mt-1 animate-pulse border theme-border">
                    ${initial}
                </div>
                <div class="flex-1 max-w-[85%] min-w-0">
                    <div class="ai-bubble border border-black/5 p-3 sm:p-4 rounded-2xl rounded-tl-sm shadow-sm flex flex-col gap-2">
                        <div class="flex items-center gap-2 theme-text text-sm font-medium">
                            <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                            <span id="loading-text-${id}" class="truncate">思考中...</span>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            lucide.createIcons();
            scrollToBottom();
            return id;
        }

        function updateLoadingText(id, text) {
            const el = document.getElementById(`loading-text-${id}`);
            if(el) el.textContent = text;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        window.toggleThought = function(id) {
            const el = document.getElementById(id);
            if(el) el.classList.toggle('open');
        };

    </script>
</body>
</html>
